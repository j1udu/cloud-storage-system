server:
  port: 8080
  read_timeout_sec: 30
  write_timeout_sec: 60

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "cloudapp"
  password: "cloudpassword"
  database: "cloud_storage"
  max_open_conns: 100
  max_idle_conns: 20

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 50

minio:
  endpoint: "127.0.0.1:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin123"
  bucket: "cloud-storage"
  use_ssl: false

jwt:
  secret: "change-this-in-production"
  expire_hour: 24
  issuer: "cloud-storage-system"

upload:
  chunk_size_bytes: 5242880
  max_file_size_bytes: 53687091200
  session_expire_hour: 24
