<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>云盘后端接口测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; max-width: 500px; }
        h1 { font-size: 20px; margin-bottom: 16px; }
        h2 { font-size: 16px; margin-bottom: 12px; color: #333; }
        label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 12px; font-size: 14px; }
        button { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 8px; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 4px; font-size: 13px; overflow-x: auto; margin-top: 8px; }
        .token-info { font-size: 13px; color: #888; margin-top: 4px; word-break: break-all; }
    </style>
</head>
<body>

<h1>云盘后端接口测试</h1>

<div class="card">
    <h2>1. 注册</h2>
    <label>用户名</label>
    <input type="text" id="reg-username" value="testuser">
    <label>密码</label>
    <input type="text" id="reg-password" value="123456">
    <button class="btn-primary" onclick="doRegister()">注册</button>
    <pre id="reg-result"></pre>
</div>

<div class="card">
    <h2>2. 登录</h2>
    <label>用户名</label>
    <input type="text" id="login-username" value="testuser">
    <label>密码</label>
    <input type="text" id="login-password" value="123456">
    <button class="btn-success" onclick="doLogin()">登录</button>
    <div class="token-info" id="token-info"></div>
    <pre id="login-result"></pre>
</div>

<div class="card">
    <h2>3. 获取用户信息</h2>
    <button class="btn-primary" onclick="doGetProfile()">获取</button>
    <pre id="profile-result"></pre>
</div>

<div class="card">
    <h2>4. Ping</h2>
    <button class="btn-primary" onclick="doPing()">Ping</button>
    <pre id="ping-result"></pre>
</div>

<script>
const BASE = 'http://localhost:8080/api/v1'
let token = ''

async function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' }
    if (token) headers['Authorization'] = 'Bearer ' + token
    const res = await fetch(BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined })
    return res.json()
}

async function doRegister() {
    const data = await api('POST', '/auth/register', {
        username: document.getElementById('reg-username').value,
        password: document.getElementById('reg-password').value
    })
    document.getElementById('reg-result').textContent = JSON.stringify(data, null, 2)
}

async function doLogin() {
    const data = await api('POST', '/auth/login', {
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value
    })
    if (data.code === 0) {
        token = data.data.token
        document.getElementById('token-info').textContent = 'Token: ' + token
    }
    document.getElementById('login-result').textContent = JSON.stringify(data, null, 2)
}

async function doGetProfile() {
    if (!token) { alert('请先登录'); return }
    const data = await api('GET', '/auth/profile')
    document.getElementById('profile-result').textContent = JSON.stringify(data, null, 2)
}

async function doPing() {
    const res = await fetch('http://localhost:8080/ping')
    const data = await res.json()
    document.getElementById('ping-result').textContent = JSON.stringify(data, null, 2)
}
</script>

</body>
</html>
