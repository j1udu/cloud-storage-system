openapi: 3.0.3

info:
  title: 云盘系统后端 API
  description: 分布式云盘系统后端接口文档
  version: 1.0.0
  contact:
    name: 周子尧

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境

tags:
  - name: 认证
    description: 用户注册、登录、信息管理

paths:
  /auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 注册新用户，用户名唯一
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: "testuser"
              password: "123456"
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                code: 0
                msg: "success"
                data:
                  id: 1
                  username: "testuser"
                  nickname: "testuser"
                  status: 1
                  created_at: "2026-04-18T16:52:39Z"
                  updated_at: "2026-04-18T16:52:39Z"
        '400':
          description: 参数错误或用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 登录并返回 JWT 令牌
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: "testuser"
              password: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
              example:
                code: 0
                msg: "success"
                data:
                  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  expires_at: 1776617748
                  user:
                    id: 1
                    username: "testuser"
                    nickname: "testuser"
                    status: 1
                    created_at: "2026-04-18T16:52:39Z"
                    updated_at: "2026-04-18T16:52:39Z"
        '400':
          description: 参数错误或用户名密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/profile:
    get:
      tags:
        - 认证
      summary: 获取当前用户信息
      description: 根据 JWT 令牌获取用户信息
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                code: 0
                msg: "success"
                data:
                  id: 1
                  username: "testuser"
                  nickname: "testuser"
                  status: 1
                  created_at: "2026-04-18T16:52:39Z"
                  updated_at: "2026-04-18T16:52:39Z"
        '401':
          description: 未认证或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "在登录接口获取 token，格式：Bearer <token>"

  schemas:
    BaseResponse:
      type: object
      required:
        - code
        - msg
      properties:
        code:
          type: integer
          description: "0=成功，非0=失败"
          example: 0
        msg:
          type: string
          description: 响应消息
          example: "success"
        data:
          description: 响应数据，失败时为 null

    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          description: 登录用户名
          example: "testuser"
        password:
          type: string
          minLength: 6
          maxLength: 128
          description: 登录密码
          example: "123456"
        nickname:
          type: string
          maxLength: 128
          description: 昵称（可选，不填则默认为用户名）
          example: "张三"

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
          example: "testuser"
        password:
          type: string
          description: 密码
          example: "123456"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT 令牌
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_at:
          type: integer
          format: int64
          description: 令牌过期时间（Unix时间戳，秒）
          example: 1776617748
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: integer
          format: uint64
          description: 用户ID
          example: 1
        username:
          type: string
          description: 用户名
          example: "testuser"
        nickname:
          type: string
          description: 昵称
          example: "testuser"
        status:
          type: integer
          description: "用户状态：1=正常 2=禁用"
          example: 1
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-04-18T16:52:39Z"
        updated_at:
          type: string
          format: date-time
          description: 更新时间
          example: "2026-04-18T16:52:39Z"

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              nullable: true
          example:
            code: 10001
            msg: "用户名已存在"
            data: null
